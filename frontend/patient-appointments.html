<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VaxCare — My Appointments</title>
  <link rel="stylesheet" href="./css/styles.css"/>
  <!-- interceptor.js: wraps fetch() to auto-inject JWT token on every API call -->
  <script src="./js/interceptor.js"></script>
  <!-- script.js: provides checkAuth(), syncTopNav(), logoutUser() helpers -->
  <script src="./js/script.js"></script>
</head>
<body>

<div class="app">

  <!-- Sidebar — Navigation links (Dashboard, My Appointments) + Logout button -->
  <aside class="sidebar">
    <div class="brand">
      <h1>VaxCare</h1>
      <p>Clinical Portal</p>
    </div>
    <nav class="sidenav">
      <a class="navlink" href="./patient-dashboard.html">
        <span class="material-symbols-outlined">dashboard</span>
        <span>Dashboard</span>
      </a>
      <a class="navlink active" href="./patient-appointments.html">
        <span class="material-symbols-outlined">calendar_today</span>
        <span>My Appointments</span>
      </a>
      <a class="navlink" href="./patient-history.html">
        <span class="material-symbols-outlined">history</span>
        <span>Vaccination History</span>
      </a>
      <a class="navlink" href="./patient-profile.html">
        <span class="material-symbols-outlined">manage_accounts</span>
        <span>My Profile</span>
      </a>
    </nav>
    <div class="sidefoot">
      <button class="logout" onclick="logoutUser()">
        <span class="material-symbols-outlined">logout</span>
        <span>Logout</span>
      </button>
    </div>
  </aside>

  <!-- Main Area -->
  <div class="main">

    <!-- Top Header — page title + user name/avatar (populated by syncTopNav()) -->
    <header class="header">
      <h2 class="header-title">My Appointments</h2>
      <div class="header-right">
        <div class="header-user">
          <span class="header-name" id="top-nav-name">Welcome back</span>
          <div class="avatar"
               style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#0061a4,#00a8ff);
                      color:#fff;display:flex;align-items:center;justify-content:center;
                      font-weight:700;font-size:16px;overflow:hidden;flex-shrink:0;">
            <img id="header-avatar-img" src="" alt=""
                 style="display:none;width:100%;height:100%;object-fit:cover;border-radius:50%;"/>
            <span id="header-avatar-init"></span>
          </div>
        </div>
      </div>
    </header>

    <!-- Page Content -->
    <main class="content">

      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;padding-bottom:1rem;border-bottom:1px solid #bfc7d4;">
        <h3 style="font-family:'Manrope',sans-serif;font-size:1.5rem;font-weight:800;">My Appointments</h3>
      </div>

      <!-- Active appointments — shows Pending & Accepted bookings with Cancel button -->
      <div id="activeSection">
        <div id="activeContainer" class="appt-list"></div>
      </div>

    </main>

    <!-- Footer -->
    <footer class="dash-foot">
      <div class="foot-logo">VaxCare</div>
      <div class="foot-links">
        <a href="#">Privacy Policy</a>
        <a href="#">Terms of Service</a>
        <a href="#">Support</a>
      </div>
      <p class="foot-note">© 2024 VaxCare Clinical Sanctuary. All rights reserved.</p>
    </footer>

  </div>
</div>



<script>
    // Month abbreviations for formatting dates in appointment cards
    const monthNames = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];




    // loadAppointments() — fetches all bookings for the current user from GET /bookings,
    // then splits them into Upcoming (Pending/Accepted) and Completed sections
    async function loadAppointments() {
        const userStr = localStorage.getItem('vaxUser');
        if (!userStr) { window.location.href = './index.html'; return; }
        const user = JSON.parse(userStr);

        try {
            const res = await fetch('/bookings?userId=' + user._id);
            const appointments = await res.json();

            const activeEl = document.getElementById('activeContainer');
            activeEl.innerHTML = '';

            appointments.forEach(apt => {
                const aptDate = new Date(apt.date);
                const mName   = isNaN(aptDate) ? 'Unknown' : monthNames[aptDate.getMonth()];
                const dNum    = isNaN(aptDate) ? '--' : aptDate.getDate();
                const yr      = isNaN(aptDate) ? '----' : aptDate.getFullYear();
                const vaxName = apt.vaccineId ? apt.vaccineId.name : 'Vaccine';
                const locName = apt.vaccineId ? apt.vaccineId.hospitalName : 'Unknown Hospital';
                const docName = apt.vaccineId ? (apt.vaccineId.doctorName || 'Staff') : 'Staff';
                const status  = (apt.status || '').toLowerCase();

                if (status === 'pending' || status === 'accepted') {
                    const badgeCss = status === 'accepted'
                        ? 'background:#d1fae5;color:#065f46;'
                        : 'background:#fef9c3;color:#854d0e;';

                    const totalD = apt.totalDoses > 1 ? apt.totalDoses : (apt.vaccineId?.dosesRequired || 1);
                    const doseN  = apt.doseNumber || 1;
                    const doseBadge = totalD > 1 
                        ? `<span style="display:inline-block;padding:.1rem .5rem;border-radius:4px;font-size:.65rem;font-weight:700;text-transform:uppercase;background:#e9f5ff;color:#0061a4;margin-left:0.5rem;vertical-align:middle;">Dose ${doseN} of ${totalD}</span>`
                        : '';

                    activeEl.innerHTML += `
                    <div class="appt">
                        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;background:#f1f5f9;border-radius:1rem;padding:1rem 1.25rem;min-width:80px;text-align:center;">
                            <span style="font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#0061a4;">${mName}</span>
                            <span style="font-size:2rem;font-weight:900;line-height:1;">${dNum}</span>
                        </div>
                        <div class="appt-info">
                            <span style="display:inline-block;padding:.2rem .7rem;border-radius:9999px;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;${badgeCss}width:fit-content;">${apt.status}</span>
                            <h4 style="display:flex;align-items:center;">${vaxName} ${doseBadge}</h4>
                            <p>${locName} · ${apt.time || 'TBD'}</p>
                        </div>
                        <div class="appt-acts" style="display:flex;gap:0.5rem;align-items:center;">
                            <button onclick="cancelAppointment('${apt._id}')" class="btn btn-red btn-sm">Cancel</button>
                        </div>
                    </div>`;
                }
            });

            if (!activeEl.innerHTML) {
                activeEl.innerHTML = `
                <div class="empty">
                    <span class="material-symbols-outlined">event_busy</span>
                    <p>No active appointments found</p>
                    <small>Book a vaccine from the dashboard to see it here.</small>
                </div>`;
            }
        } catch (e) { console.error(e); }
    }

    // cancelAppointment() — sends PUT /bookings/:id with status='Cancelled'.
    // The backend also restores +1 vaccine stock when a booking is cancelled.
    async function cancelAppointment(id) {
        try {
            await fetch('/bookings/' + id, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: 'Cancelled' })
            });
            loadAppointments();
        } catch (e) { console.error(e); }
    }

    // DOMContentLoaded — entry point
    document.addEventListener('DOMContentLoaded', async () => {
        if (!await checkAuth('patient')) return;
        syncTopNav();
        loadAppointments();
    });
</script>
</body>
</html>
